    <!-- telunjuk panjang -->
    <rect x="13.2" y="1" width="5.8" height="16.5" rx="2.9"/>
    <!-- kepalan membulat -->
    <path d="M10.4 15.2
             q-3.6 .4 -3.6 4.4
             q0 3.6 2.4 5.6
             q2.4 2 6.8 2
             q4.4 0 6.8 -2
             q2.4 -2 2.4 -5.6
             q0 -4 -3.6 -4.4 Z"/>
